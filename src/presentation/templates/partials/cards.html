<div class="cards-grid">
  {% for widget in cards %}
    <article class="card kpi-card" id="widget-{{ widget.widget_id }}">
      <div class="kpi-title">{{ widget.title }}</div>
      <div class="kpi-value">{{ widget.value }}</div>
      {% if widget.delta_label %}
        <div class="card-delta">{{ widget.delta_label }}</div>
      {% endif %}
      {% if widget.help_text %}
        <div class="kpi-subtitle">{{ widget.help_text }}</div>
      {% endif %}
    </article>
  {% endfor %}
</div>
