<div class="{{ wrapper_class }}">
  {% for alert in alerts %}
    {% set level = (alert.critic_level.value if alert.critic_level is defined else 'warning') | lower %}
    <article class="alert alert--{{ level }}" id="widget-{{ alert.widget_id }}">
      <h3 class="alert-title">{{ alert.title }}</h3>
      <p class="alert-message">{{ alert.message }}</p>
      {% if alert.details %}
        <ul class="alert-details">
          {% for detail in alert.details %}
            <li>{{ detail }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    </article>
  {% endfor %}
</div>
